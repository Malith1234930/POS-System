<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Dashboard</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

    <div class="sidebar">

        <ul>
            <li>Dashboard</li>
            <li>Customer</li>
            <li>Items</li>
            <li>Order</li>
            <li>Order History</li>
        </ul>

        <div class="logout">Log Out</div>
    </div>


    <div class="main">

        <div class="topbar">
            <input type="text" placeholder="Search Recent.....">
            <div class="date">2026.04.30<br>12.35 PM</div>
        </div>

        <div class="cards">
            <div class="card">Customers<br><span>2</span></div>
            <div class="card">Items<br><span>8</span></div>
            <div class="card">Orders<br><span>3</span></div>
            <div class="card">Income<br><span>$250,000</span></div>
        </div>

        <div class="chart">
            <h3>Order Analysis</h3>
            <div class="bars">
                <div style="height:50px"></div>
                <div style="height:150px"></div>
                <div style="height:200px"></div>
                <div style="height:250px"></div>
                <div style="height:120px"></div>
                <div style="height:220px"></div>
                <div style="height:170px"></div>
            </div>
        </div>

        <table>
            <tr>
                <th>ID</th>
                <th>Customer</th>
                <th>Date</th>
                <th>Total</th>
            </tr>
            <tr>
                <td>1</td>
                <td>Malith Bhagya</td>
                <td>2026.04.30</td>
                <td>$50000</td>
            </tr>
            <tr>
                <td>2</td>
                <td>Yasiru Lakshan</td>
                <td>2026.04.28</td>
                <td>$30000</td>
            </tr>
            <tr>
                <td>3</td>
                <td>Rivith Panthila</td>
                <td>2026.05.03</td>
                <td>$20000</td>
            </tr>
        </table>

    </div>
</div>

</body>
</html>
