<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simple POS System</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <!-- JQuery -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>

    <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- LOGIN PAGE -->
<section id="loginPage" class="vh-100 d-flex justify-content-center align-items-center bg-light">
    <div class="card shadow p-4 login-card">
        <h2 class="text-center mb-4 text-success">HARDWARE POS LOGIN</h2>

        <input type="text" id="username" class="form-control mb-3" placeholder="Username">
        <input type="password" id="password" class="form-control mb-3" placeholder="Password">

        <button class="btn btn-success w-100" id="loginBtn">Login</button>

        <p class="text-center mt-3 text-muted">
            Username : admin <br>
            Password : 1234
        </p>
    </div>
</section>

<!-- MAIN APP -->
<section id="mainPage" class="d-none">

    <div class="container-fluid">
        <div class="row">

            <!-- SIDEBAR -->
            <div class="col-lg-2 sidebar p-4">
                <h2 class="text-white text-center mb-5">Hardware POS</h2>

                <button class="menu-btn" onclick="showSection('dashboardSection')">
                    <i class="bi bi-house-fill"></i> Dashboard
                </button>

                <button class="menu-btn" onclick="showSection('customerSection')">
                    <i class="bi bi-people-fill"></i> Customers
                </button>

                <button class="menu-btn" onclick="showSection('itemSection')">
                    <i class="bi bi-grid-fill"></i> Items
                </button>

                <button class="menu-btn" onclick="showSection('orderSection')">
                    <i class="bi bi-cart-fill"></i> Orders
                </button>

                <button class="menu-btn" onclick="showSection('historySection')">
                    <i class="bi bi-clock-history"></i> Order History
                </button>

                <button class="logout-btn" id="logoutBtn">
                    <i class="bi bi-box-arrow-right"></i> Logout
                </button>
            </div>

            <!-- CONTENT -->
            <div class="col-lg-10 p-4 bg-light min-vh-100">

                <!-- TOP -->
                <div class="d-flex justify-content-between align-items-center mb-4">
                    <input type="text" class="form-control w-50" placeholder="Search...">
                    <h5 id="dateTime"></h5>
                </div>
